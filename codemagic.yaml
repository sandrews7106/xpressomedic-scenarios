workflows:
  ios_release:
    name: iOS Release (Signed)
    instance_type: mac_mini_m2
    max_build_duration: 120

    integrations:
      app_store_connect: "SCEMS Protocols"

    environment:
      xcode: latest
      node: 20.11.1

      ios_signing:
        distribution_type: app_store
        bundle_identifier: "com.xpressomedic.scenarioapp"

      vars:
        MARKETING_VERSION: "1.0.1"
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"

    scripts:
      - name: Print environment
        script: |
          set -euo pipefail
          echo "MARKETING_VERSION=${MARKETING_VERSION:-}"
          echo "CM_BUILD_NUMBER=${CM_BUILD_NUMBER:-}"
          echo "BUILD_NUMBER=${BUILD_NUMBER:-}"
          node -v
          npm -v
          xcodebuild -version
          which pod || true
          pod --version || true

      - name: Compute Apple build number (numeric only)
        script: |
          set -euo pipefail
          BUILD_NUM="${CM_BUILD_NUMBER:-${BUILD_NUMBER:-$(date +%s)}}"
          echo "BUILD_NUM=$BUILD_NUM"
          echo "BUILD_NUM=$BUILD_NUM" >> "$CM_ENV"

      - name: Install JS dependencies
        script: |
          set -euo pipefail
          if [ -f package-lock.json ]; then
            npm ci --no-audit --no-fund
          else
            npm install --no-audit --no-fund
          fi

      - name: Sync www into iOS bundle (Capacitor)
        script: |
          set -euo pipefail
          npx cap sync ios

          echo "=== VERIFY WEB ASSETS IN IOS BUNDLE ==="
          ls -l ios/App/App/public/index.html
          ls -l ios/App/App/public/map.html

      - name: Install CocoaPods (required for Capacitor)
        script: |
          set -euo pipefail
          cd ios/App
          if ! command -v pod >/dev/null 2>&1; then
            sudo gem install cocoapods --no-document
          fi
          pod repo update || true
          pod install --repo-update

      - name: Apply signing
        script: |
          set -euo pipefail
          xcode-project use-profiles

      - name: Clean Xcode DerivedData
        script: |
          set -euo pipefail
          rm -rf "$HOME/Library/Developer/Xcode/DerivedData"/* || true

      - name: Build IPA (archive + export)
        script: |
          set -euo pipefail

          ARCHIVE_PATH="build/ios/xcarchive/App.xcarchive"
          EXPORT_PATH="build/ios/ipa"
          mkdir -p "$(dirname "$ARCHIVE_PATH")" "$EXPORT_PATH"

          echo "Using MARKETING_VERSION=${MARKETING_VERSION}"
          echo "Using CURRENT_PROJECT_VERSION=${BUILD_NUM}"

          # Archive
          xcodebuild \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath "$ARCHIVE_PATH" \
            MARKETING_VERSION="$MARKETING_VERSION" \
            CURRENT_PROJECT_VERSION="$BUILD_NUM" \
            archive

          echo "=== ARCHIVE VERSION (APPLE SEES THIS) ==="
          /usr/libexec/PlistBuddy -c "Print :ApplicationProperties:CFBundleShortVersionString" "$ARCHIVE_PATH/Info.plist" || true
          /usr/libexec/PlistBuddy -c "Print :ApplicationProperties:CFBundleVersion" "$ARCHIVE_PATH/Info.plist" || true

          # Write export options plist
          python3 -c 'open("export_options.plist","w").write("""<?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>VQGPM443U5</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.xpressomedic.scenarioapp</key>
              <string>XpressoMedic Scenarios App Store Profile</string>
            </dict>
          </dict>
          </plist>
          """)'

          # Export
          xcodebuild \
            -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist "export_options.plist" \
            COMPILER_INDEX_STORE_ENABLE=NO

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
